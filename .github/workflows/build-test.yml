name: Build & Test CI

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Precompile Dictionaries
        run: node precompile-dictionaries.js

      - name: Run Linting
        run: npm run lint

      - name: Run Type Checking
        run: npx astro check

      - name: Run Build
        run: npm run build

      - name: Run Tests
        run: npm run test
